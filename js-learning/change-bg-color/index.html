<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      function change() {
        let color = "#";
        for (let i = 0; i < 8; i++) {
          let num = Math.floor(Math.random() * 16);
          if (num === 10) {
            num = "a";
          } else if (num === 10) {
            num = "a";
            color += num;
          } else if (num === 11) {
            num = "b";
            color += num;
          } else if (num === 12) {
            num = "c";
            color += num;
          } else if (num === 13) {
            num = "d";
            color += num;
          } else if (num === 14) {
            num = "e";
            color += num;
          } else if (num === 15) {
            num = "f";
            color += num;
          } else {
            color += num;
          }
        }
        document.body.style.backgroundColor = color;
        document.querySelector("h1").textContent = color;
      }
    </script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <h1>#fff</h1>
    <button onclick="change()" id="btn">Click to Change</button>
  </body>
</html>

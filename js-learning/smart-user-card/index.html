<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        const user = {
    name:"mehrad",
    birthYear:2005,
    job:"Student",
    update() {
        this.name = document.querySelector("#username").value
        this.job = document.querySelector("#job").value
        const birthValue = document.querySelector("#birth").value
        if (birthValue) {
            this.birthYear = new Date(birthValue).getFullYear()
        }
    },
    getAge() {
        const today = new Date()
        const age = today.getFullYear()-this.birthYear
        if(age>=0) {
            return age
        }
        else {
            return "Invalid birth year"
        }
    },
    render() {
        this.update()
        let paragraph = document.querySelector("p")
        if(!paragraph) {
            paragraph=document.createElement("p")
            document.querySelector("#main").appendChild(paragraph)
        }
        paragraph.textContent = `user name is ${this.name}. user is ${this.getAge()}. user works as a ${this.job}`
    }
}
    </script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
   <div id="main">
     <label for="username">Username</label>
    <input type="text" name="username" id="username">
    <label for="birth">Birth Day</label>
    <input type="date" name="birth" id="birth">
    <label for="job">Job</label>
    <input type="text" name="job" id="job">
    <button onclick="user.render()">Click Here</button>
   </div>
</body>
</html>
